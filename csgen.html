<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR CS Past Paper Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ── Reset ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:14px;background:#f0f2f5;color:#1a1a1a;min-height:100vh}

/* ── Layout ─────────────────────────────────────────────────────── */
#app{display:flex;gap:0;min-height:100vh}
#sidebar{width:380px;min-width:340px;background:#fff;border-right:1px solid #dde1e7;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────────────────── */
#sidebar-header{padding:20px 20px 16px;border-bottom:1px solid #eef0f3}
#sidebar-header h1{font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.3}
#sidebar-header p{font-size:12px;color:#666;margin-top:4px}

/* Level toggle */
#level-toggle{display:flex;margin:16px 16px 0;border:1.5px solid #d0d4db;border-radius:8px;overflow:hidden}
.level-btn{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#fff;color:#555;transition:all .15s}
.level-btn.active{background:#1a3a5c;color:#fff}

/* Stats */
#stats-bar{margin:12px 16px;background:#f7f9fc;border:1px solid #e5e9f0;border-radius:7px;padding:10px 14px;font-size:12px;color:#555;line-height:1.6}
#stats-bar strong{color:#1a3a5c}

/* Sections */
.section{padding:14px 16px;border-bottom:1px solid #eef0f3}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;margin-bottom:10px}

/* Global controls */
.ctrl-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;font-size:13px}
.ctrl-row label{min-width:100px;color:#444;font-weight:500}
.ctrl-row input[type=number],.ctrl-row select{flex:1;padding:6px 8px;border:1px solid #d0d4db;border-radius:5px;font-size:13px;color:#1a1a1a;background:#fff}
.ctrl-row input[type=number]:focus,.ctrl-row select:focus{outline:none;border-color:#1a3a5c}
.range-wrap{display:flex;gap:6px;flex:1;align-items:center;font-size:12px}
.range-wrap input{flex:1;padding:6px 6px;border:1px solid #d0d4db;border-radius:5px;font-size:12px;width:60px}
.toggle-wrap{display:flex;gap:8px;align-items:center}
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:20px;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:#1a3a5c}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}

/* Topic panel */
#topic-panel{overflow-y:auto}
.comp-group{border-bottom:1px solid #eef0f3}
.comp-header{padding:10px 16px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#1a3a5c;background:#f7f9fc;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;gap:8px}
.comp-header:hover{background:#edf1f7}
.comp-toggle-all{font-size:11px;color:#888;font-weight:400;text-transform:none;letter-spacing:0;padding:2px 6px;border:1px solid #d5d9e0;border-radius:4px;background:#fff;white-space:nowrap;flex-shrink:0}
.comp-toggle-all:hover{background:#f0f2f5;color:#1a3a5c}
.topic-list{padding:4px 0}
.topic-row{display:flex;align-items:center;padding:6px 16px;gap:8px;font-size:13px;transition:background .1s}
.topic-row:hover{background:#f7f9fc}
.topic-row.as-excluded{opacity:.35;pointer-events:none}
.topic-row.as-partial{background:#fffbf0}
.topic-check{width:15px;height:15px;accent-color:#1a3a5c;cursor:pointer;flex-shrink:0}
.topic-name{flex:1;color:#2c2c2c}
.topic-partial-note{font-size:10px;color:#a07000;margin-left:2px}
.topic-count-input{width:48px;padding:3px 5px;border:1px solid #d0d4db;border-radius:4px;font-size:12px;text-align:center;color:#1a1a1a;-moz-appearance:textfield;appearance:textfield}
.topic-count-input:focus{outline:none;border-color:#1a3a5c}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}

/* Actions */
#actions{padding:14px 16px;display:flex;flex-direction:column;gap:8px;border-top:1px solid #eef0f3;background:#fff}
#generate-btn{padding:11px 0;background:#1a3a5c;color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
#generate-btn:hover{background:#0f2640}
#generate-btn:disabled{background:#a0adb8;cursor:not-allowed}
#export-btn{padding:10px 0;background:#2e7d32;color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;display:none;transition:background .15s}
#export-btn:hover{background:#1b5e20}
#export-btn:disabled{background:#a0adb8;cursor:not-allowed}
#progress-msg{font-size:12px;color:#555;text-align:center;min-height:16px}

/* ── Main panel ─────────────────────────────────────────────────── */
#main-header{padding:16px 24px 14px;background:#fff;border-bottom:1px solid #dde1e7;display:flex;justify-content:space-between;align-items:center}
#main-header h2{font-size:15px;font-weight:700;color:#1a1a1a}
#paper-stats{font-size:12px;color:#666}
#error-msg{display:none;margin:20px 24px;padding:14px 18px;background:#fff5f5;border:1px solid #ffcdd2;border-radius:7px;color:#c62828;font-size:13px;line-height:1.5}
#preview-wrap{flex:1;overflow-y:auto;padding:24px;background:#e8eaed;display:flex;flex-direction:column;align-items:center;gap:0}
#preview-wrap.empty{justify-content:center}
.preview-placeholder{text-align:center;color:#999;font-size:14px}
.preview-placeholder svg{display:block;margin:0 auto 12px;opacity:.3}

/* ── A4 Paper (preview) ─────────────────────────────────────────── */
.a4-page{
  width:210mm;
  min-height:297mm;
  background:#fff;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
  margin-bottom:12px;
  font-family:Arial,Helvetica,sans-serif;
  font-size:11pt;
  color:#000;
  position:relative;
  display:flex;
  flex-direction:column;
}
.page-inner{
  padding:14mm 18mm 12mm;
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Cover page */
.cover-logo{width:130px;height:auto;display:block;margin-bottom:10mm}
.cover-line{border:none;border-top:2px solid #000;margin:4mm 0}
.cover-title{font-size:16pt;font-weight:bold;margin-bottom:2mm}
.cover-subtitle{font-size:12pt;margin-bottom:1mm}
.cover-ref{font-size:12pt;font-weight:bold;margin-bottom:2mm}
.cover-practice{font-size:14pt;font-weight:bold;letter-spacing:2px;margin-bottom:6mm}
.cover-meta-grid{display:grid;grid-template-columns:140px 1fr;gap:3mm 6mm;margin-bottom:6mm;font-size:11pt}
.cover-meta-grid .label{font-weight:bold}
.cover-meta-grid .value{border-bottom:1px solid #000;padding-bottom:1mm;min-width:60mm}
.candidate-boxes{display:grid;grid-template-columns:1fr 1fr;gap:4mm;margin-bottom:4mm}
.candidate-box{border:1px solid #000;padding:2mm 3mm}
.candidate-box .box-label{font-size:9pt;color:#444;margin-bottom:1mm}
.candidate-box .box-line{height:7mm;border-bottom:1px solid #000}
.candidate-box-3{border:1px solid #000;padding:2mm 3mm;margin-bottom:6mm}
.instructions-box{border:2px solid #000;padding:3mm 4mm;font-size:10pt}
.instructions-box h3{font-size:11pt;font-weight:bold;margin-bottom:2mm}
.instructions-box ul{padding-left:5mm;list-style:disc}
.instructions-box ul li{margin-bottom:1mm;line-height:1.4}
.cover-total{font-size:11pt;font-weight:bold;margin-top:3mm}

/* Question pages */
.page-header{display:flex;justify-content:space-between;font-size:9pt;padding-bottom:2mm;border-bottom:1.5px solid #000;margin-bottom:5mm}
.page-footer{display:flex;justify-content:center;align-items:flex-end;font-size:9pt;margin-top:auto;padding-top:3mm;border-top:1px solid #000;position:relative}
.footer-page{text-align:center;flex:1}
.turn-over{position:absolute;right:0;font-size:9pt;font-weight:bold}

/* Questions */
.questions-area{flex:1}
.question-block{margin-bottom:7mm}
.question-num-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2mm}
.question-num{font-weight:bold;font-size:11pt;min-width:8mm}
.question-text{flex:1;line-height:1.5;font-size:11pt}
.question-marks{font-weight:bold;font-size:11pt;min-width:10mm;text-align:right;align-self:flex-end}
.sub-block{margin-left:8mm;margin-bottom:4mm}
.sub-num-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1mm}
.sub-label{font-weight:normal;min-width:8mm;font-size:11pt}
.sub-text{flex:1;line-height:1.5;font-size:11pt}
.sub-marks{font-weight:bold;font-size:11pt;min-width:10mm;text-align:right;align-self:flex-end}
.subsub-block{margin-left:8mm;margin-bottom:3mm}
.answer-space{margin-top:2mm;margin-bottom:1mm}
.answer-lines{
  background-image:repeating-linear-gradient(
    to bottom,
    transparent,
    transparent calc(8mm - 1px),
    #bbb calc(8mm - 1px),
    #bbb 8mm
  );
  background-size:100% 8mm;
  width:100%;
}

/* ── View mode toggle ───────────────────────────────────────────── */
.view-mode-wrap{display:flex;align-items:center;gap:3px;background:#f0f2f5;border-radius:7px;padding:3px}
.view-mode-btn{padding:4px 11px;font-size:12px;font-weight:600;border:none;border-radius:5px;cursor:pointer;background:transparent;color:#666;transition:all .15s;white-space:nowrap}
.view-mode-btn.active{background:#fff;color:#1a3a5c;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* ── Report modal ───────────────────────────────────────────────── */
#report-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
#report-overlay.open{display:flex}
#report-modal{background:#fff;border-radius:10px;padding:24px 28px;width:360px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
#report-modal h3{font-size:15px;font-weight:700;margin-bottom:4px}
#report-modal p{font-size:12px;color:#666;margin-bottom:16px}
#report-modal label{font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:4px}
#report-modal input,#report-modal textarea{width:100%;border:1.5px solid #d0d4db;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;color:#1a1a1a;margin-bottom:14px}
#report-modal input:focus,#report-modal textarea:focus{outline:none;border-color:#1a3a5c}
#report-modal textarea{resize:vertical;min-height:70px}
.report-btns{display:flex;gap:8px;margin-top:4px}
#report-send{flex:1;padding:9px 0;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
#report-send:hover{background:#0f2640}
#report-send:disabled{background:#a0adb8;cursor:not-allowed}
#report-cancel{padding:9px 16px;background:#f0f2f5;color:#555;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
#report-cancel:hover{background:#e0e4ea}
#report-status{font-size:12px;text-align:center;min-height:16px;margin-top:8px}

/* ── Hidden render target ─────────────────────────────────────────── */
#paper-render{
  position:fixed;
  top:-9999px;
  left:-9999px;
  width:210mm;
  pointer-events:none;
  z-index:-1;
}

/* ── Mobile drawer ───────────────────────────────────────────────── */
#mobile-fab{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:400;gap:10px}
#mobile-open-btn{padding:12px 22px;background:#1a3a5c;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#mobile-generate-btn{padding:12px 22px;background:#2e7d32;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25)}
#drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:498}
#drawer-backdrop.open{display:block}
#sidebar-close-btn{display:none;position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#555;line-height:1;padding:4px}

/* ── Responsive ─────────────────────────────────────────────────── */
@media(max-width:768px){
  #app{flex-direction:column}
  #sidebar{
    position:fixed;bottom:0;left:0;right:0;
    width:100%;max-height:90vh;
    z-index:499;
    border-right:none;border-top:1px solid #dde1e7;
    border-radius:16px 16px 0 0;
    transform:translateY(100%);
    transition:transform .3s ease;
    overflow-y:auto;
  }
  #sidebar.drawer-open{transform:translateY(0)}
  #sidebar-close-btn{display:block}
  #main{min-height:100vh;padding-bottom:80px}
  #mobile-fab{display:flex}
  #actions{display:none}
  #preview-wrap{overflow-x:auto;align-items:flex-start;padding:16px 0}
}
@media(min-width:769px){
  .a4-page{width:210mm;min-height:297mm}
}
</style>
</head>
<body>
<div id="app">

<!-- ═══════════════════════════════════════════════════════ SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header" style="position:relative">
    <h1>OCR CS Past Paper Generator</h1>
    <p>H446 A Level &amp; H047 AS Level</p>
    <button id="sidebar-close-btn" onclick="closeDrawer()">✕</button>
  </div>

  <div id="level-toggle">
    <button class="level-btn active" id="btn-alevel" onclick="setLevel('alevel')">A Level (H446)</button>
    <button class="level-btn" id="btn-aslevel" onclick="setLevel('aslevel')">AS Level (H047)</button>
  </div>

  <div id="stats-bar">Loading question bank...</div>

  <div class="section">
    <div class="section-title">Paper Settings</div>
    <div class="ctrl-row">
      <label>Mark target</label>
      <input type="number" id="ctrl-marks" value="100" min="10" max="500" step="5">
    </div>
    <div class="ctrl-row">
      <label>Year range</label>
      <div class="range-wrap">
        <input type="number" id="ctrl-year-from" value="2016" min="2016" max="2024">
        <span>–</span>
        <input type="number" id="ctrl-year-to" value="2024" min="2016" max="2024">
      </div>
    </div>
    <div class="ctrl-row">
      <label for="ctrl-shuffle">Shuffle</label>
      <input type="checkbox" id="ctrl-shuffle" checked style="width:16px;height:16px;accent-color:#1a3a5c;cursor:pointer;flex:none">
    </div>
  </div>

  <div style="padding:6px 16px 2px;font-size:11px;color:#999">Set how many questions per topic — available shown as / N</div>
  <div id="topic-panel"></div>

  <div id="actions">
    <div id="progress-msg"></div>
    <button id="generate-btn" onclick="generatePaper()">Generate Paper</button>
    <button id="export-btn" onclick="exportPDF()">Export PDF</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ MAIN -->
<div id="main">
  <div id="main-header">
    <h2>Paper Preview</h2>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="paper-stats"></span>
      <div class="view-mode-wrap">
        <button id="view-qp-btn" class="view-mode-btn active" onclick="setViewMode('qp')">Questions</button>
        <button id="view-ms-btn" class="view-mode-btn" onclick="setViewMode('ms')">Mark Scheme</button>
      </div>
      <button onclick="openReport()" style="padding:5px 12px;font-size:12px;font-weight:600;background:#fff3f3;color:#c62828;border:1.5px solid #ffcdd2;border-radius:6px;cursor:pointer">Report question</button>
    </div>
  </div>
  <div id="error-msg"></div>
  <div id="preview-wrap" class="empty">
    <div class="preview-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      Configure topics and click <strong>Generate Paper</strong>
    </div>
  </div>
</div>

<div id="paper-render"></div>
</div>

<div id="drawer-backdrop" onclick="closeDrawer()"></div>
<div id="mobile-fab">
  <button id="mobile-open-btn" onclick="openDrawer()">⚙ Settings</button>
  <button id="mobile-generate-btn" onclick="generatePaper();closeDrawer()">Generate</button>
  <button id="mobile-export-btn" onclick="exportPDF()" style="display:none;padding:12px 22px;background:#2e7d32;color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25)">Export PDF</button>
</div>

<!-- ═══════════════════════════════════════════════════════ REPORT MODAL -->
<div id="report-overlay" onclick="if(event.target===this)closeReport()">
  <div id="report-modal">
    <h3>Report a question</h3>
    <p>Found a broken or incorrectly tagged question? Let us know.</p>
    <label for="report-id">Question / Answer ID <span style="color:#c62828">*</span></label>
    <input id="report-id" type="text" placeholder="e.g. h446-01-2024-q12-qs" autocomplete="off">
    <label for="report-desc">Description (optional)</label>
    <textarea id="report-desc" placeholder="What's wrong with this question?"></textarea>
    <div class="report-btns">
      <button id="report-cancel" onclick="closeReport()">Cancel</button>
      <button id="report-send" onclick="sendReport()">Send report</button>
    </div>
    <div id="report-status"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// TAXONOMY
// ═══════════════════════════════════════════════════════════════════
const TOPICS = [
  {id:'1.1.1_processor_structure',           label:'1.1.1 Processor Structure',            comp:1, asExcluded:false, asPartial:null},
  {id:'1.1.2_types_of_processor',            label:'1.1.2 Types of Processor',             comp:1, asExcluded:false, asPartial:null},
  {id:'1.1.3_input_output_storage',          label:'1.1.3 Input/Output/Storage',           comp:1, asExcluded:false, asPartial:null},
  {id:'1.2.1_systems_software',              label:'1.2.1 Systems Software',               comp:1, asExcluded:false, asPartial:null},
  {id:'1.2.2_applications_generation',       label:'1.2.2 Applications Generation',        comp:1, asExcluded:false, asPartial:null},
  {id:'1.2.3_software_development',          label:'1.2.3 Software Development',           comp:1, asExcluded:true,  asPartial:null},
  {id:'1.2.4_programming_languages',         label:'1.2.4 Programming Languages',          comp:1, asExcluded:false, asPartial:'No addressing modes/OOP'},
  {id:'1.3.1_compression_encryption_hashing',label:'1.3.1 Compression, Encryption & Hashing',comp:1,asExcluded:false,asPartial:'No encryption/hashing'},
  {id:'1.3.2_databases',                     label:'1.3.2 Databases',                      comp:1, asExcluded:false, asPartial:null},
  {id:'1.3.3_networks',                      label:'1.3.3 Networks',                       comp:1, asExcluded:true,  asPartial:null},
  {id:'1.3.4_web_technologies',              label:'1.3.4 Web Technologies',               comp:1, asExcluded:false, asPartial:'No SEO/PageRank'},
  {id:'1.4.1_data_types',                    label:'1.4.1 Data Types',                     comp:1, asExcluded:false, asPartial:'No bitwise/primitive types'},
  {id:'1.4.2_data_structures',               label:'1.4.2 Data Structures',                comp:1, asExcluded:false, asPartial:'Arrays, records, lists, tuples only'},
  {id:'1.4.3_boolean_algebra',               label:'1.4.3 Boolean Algebra',                comp:1, asExcluded:false, asPartial:'No simplification/flip-flops/adders'},
  {id:'1.5.1_legislation',                   label:'1.5.1 Legislation',                    comp:1, asExcluded:false, asPartial:null},
  {id:'1.5.2_moral_ethical',                 label:'1.5.2 Moral & Ethical Issues',         comp:1, asExcluded:false, asPartial:null},
  {id:'2.1.1_thinking_abstractly',           label:'2.1.1 Thinking Abstractly',            comp:2, asExcluded:true,  asPartial:null},
  {id:'2.1.2_thinking_ahead',                label:'2.1.2 Thinking Ahead',                 comp:2, asExcluded:true,  asPartial:null},
  {id:'2.1.3_thinking_procedurally',         label:'2.1.3 Thinking Procedurally',          comp:2, asExcluded:true,  asPartial:null},
  {id:'2.1.4_thinking_logically',            label:'2.1.4 Thinking Logically',             comp:2, asExcluded:true,  asPartial:null},
  {id:'2.1.5_thinking_concurrently',         label:'2.1.5 Thinking Concurrently',          comp:2, asExcluded:true,  asPartial:null},
  {id:'2.2.1_programming_techniques',        label:'2.2.1 Programming Techniques',         comp:2, asExcluded:false, asPartial:'No OOP'},
  {id:'2.2.2_computational_methods',         label:'2.2.2 Computational Methods',          comp:2, asExcluded:true,  asPartial:null},

// STATE
// ═══════════════════════════════════════════════════════════════════
let questionBank = null;
let currentLevel = 'alevel';
let viewMode = 'qp';  // 'qp' | 'ms'

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('view-qp-btn').classList.toggle('active', mode === 'qp');
  document.getElementById('view-ms-btn').classList.toggle('active', mode === 'ms');
  if (generatedPaper) renderPreview(generatedPaper.questions, generatedPaper.config);
}
let generatedPaper = null;

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  renderTopicPanel();

  await loadQuestions();
});

async function loadQuestions() {
  try {
    const resp = await fetch('assets/questions.json');
    if (!resp.ok) throw new Error(resp.status);
    questionBank = await resp.json();
    renderStats();
    renderTopicPanel();
    setMsg('');
  } catch (e) {
    showError('questions.json not found &mdash; run <code>python scraper.py</code> first and place it in the <code>assets/</code> directory.');
  }
}

// ═══════════════════════════════════════════════════════════════════
// LEVEL
// ═══════════════════════════════════════════════════════════════════
function setLevel(level) {
  currentLevel = level;
  document.getElementById('btn-alevel').classList.toggle('active', level === 'alevel');
  document.getElementById('btn-aslevel').classList.toggle('active', level === 'aslevel');
  renderTopicPanel();
  renderStats();
  clearPreview();
}

// ═══════════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════════
function renderStats() {
  const el = document.getElementById('stats-bar');
  if (!questionBank) { el.innerHTML = 'Loading question bank...'; return; }
  const qs = questionBank.questions;
  const levelQs = qs.filter(q => currentLevel === 'alevel'
    ? q.level === 'alevel'
    : (q.level === 'aslevel' || q.level === 'alevel'));
  const years = levelQs.map(q => q.year).filter(y => y > 0);
  const minY = years.length ? Math.min(...years) : '—';
  const maxY = years.length ? Math.max(...years) : '—';
  const topicMap = {};
  levelQs.forEach(q => { topicMap[q.topic] = (topicMap[q.topic]||0) + 1; });
  el.innerHTML = `<strong>${levelQs.length.toLocaleString()}</strong> questions &middot; <strong>${Object.keys(topicMap).length}</strong> topics &middot; years <strong>${minY}&ndash;${maxY}</strong><br>Compiled: ${questionBank.generated}`;
}

// ═══════════════════════════════════════════════════════════════════
// TOPIC PANEL
// ═══════════════════════════════════════════════════════════════════
function renderTopicPanel() {
  const panel = document.getElementById('topic-panel');
  const hasQs = t => !questionBank || questionBank.questions.some(q => q.topic === t.id);
  const comp1 = TOPICS.filter(t => t.comp === 1 && hasQs(t));
  const comp2 = TOPICS.filter(t => t.comp === 2 && hasQs(t));
  panel.innerHTML =
    buildCompGroup(1, 'Component 01 — Computer Systems', comp1) +
    buildCompGroup(2, 'Component 02 — Algorithms & Programming', comp2);
}

function buildCompGroup(compNum, title, topics) {
  const rows = topics.map(t => buildTopicRow(t)).join('');
  return `<div class="comp-group">
  <div class="comp-header" onclick="toggleComp(${compNum},this)">
    <span>${title}</span>
    <button class="comp-toggle-all" onclick="event.stopPropagation();toggleAllInComp(${compNum})">Select all</button>
  </div>
  <div class="topic-list" id="topic-list-${compNum}">${rows}</div>
</div>`;
}

function buildTopicRow(t) {
  const excluded = currentLevel === 'aslevel' && t.asExcluded;
  const partial  = currentLevel === 'aslevel' && !t.asExcluded && t.asPartial;
  let cls = 'topic-row';
  if (excluded) cls += ' as-excluded';
  if (partial)  cls += ' as-partial';
  const note = partial ? `<span class="topic-partial-note" title="${t.asPartial}">\u26A0</span>` : '';
  const available = questionBank
    ? questionBank.questions.filter(q => q.topic === t.id).length
    : 0;
  const maxHint = `<span style="font-size:10px;color:#aaa;white-space:nowrap">/ ${available}</span>`;
  return `<div class="${cls}" data-comp="${t.comp}">
  <input type="checkbox" class="topic-check" id="chk-${t.id}" data-topic="${t.id}" ${excluded?'disabled':''}>
  <label class="topic-name" for="chk-${t.id}">${t.label}${note}</label>
  <div style="display:flex;align-items:center;gap:3px">
    <input type="number" class="topic-count-input" id="cnt-${t.id}" value="3" min="1" max="${available||99}" title="Questions from this topic">
    ${maxHint}
  </div>
</div>`;
}

function toggleComp(compNum, headerEl) {
  const list = document.getElementById(`topic-list-${compNum}`);
  list.style.display = list.style.display === 'none' ? '' : 'none';
}

function toggleAllInComp(compNum) {
  const checks = document.querySelectorAll(`#topic-list-${compNum} .topic-check:not(:disabled)`);
  const allChecked = Array.from(checks).every(c => c.checked);
  checks.forEach(c => c.checked = !allChecked);
}

// ═══════════════════════════════════════════════════════════════════
// PAPER GENERATION
// ═══════════════════════════════════════════════════════════════════
function getConfig() {
  const selectedTopics = [];
  document.querySelectorAll('.topic-check:checked').forEach(cb => {
    selectedTopics.push({
      id: cb.dataset.topic,
      count: parseInt(document.getElementById(`cnt-${cb.dataset.topic}`)?.value || 3)
    });
  });
  return {
    selectedTopics,
    level: currentLevel,
    markTarget: parseInt(document.getElementById('ctrl-marks').value) || 100,
    yearFrom:   parseInt(document.getElementById('ctrl-year-from').value) || 2016,
    yearTo:     parseInt(document.getElementById('ctrl-year-to').value)   || 2024,
    shuffle:    document.getElementById('ctrl-shuffle').checked,
  };
}

function generatePaper() {
  if (!questionBank) { showError('Question bank not loaded yet.'); return; }
  const config = getConfig();
  if (!config.selectedTopics.length) { showError('Select at least one topic.'); return; }
  hideError();
  setMsg('Generating...');

  const paper = buildPaper(questionBank.questions, config);
  if (!paper.length) {
    showError('No questions found for selected topics/filters &mdash; broaden your selection.');
    setMsg('');
    return;
  }

  generatedPaper = { questions: paper, config };
  renderPreview(paper, config);
  setMsg('');
  document.getElementById('export-btn').style.display = 'block';
  document.getElementById('mobile-export-btn').style.display = 'block';
  const totalMarks = paper.reduce((s,q) => s + (q.marks||0), 0);
  document.getElementById('paper-stats').textContent = `${paper.length} questions \u00b7 ${totalMarks} marks`;
}

function buildPaper(allQs, config) {
  const { selectedTopics, markTarget, yearFrom, yearTo, shuffle } = config;
  const paper = [];
  let totalMarks = 0;

  for (const { id: topicId, count } of selectedTopics) {
    let pool = allQs.filter(q => {
      if (q.topic !== topicId) return false;
      if (q.year && (q.year < yearFrom || q.year > yearTo)) return false;
      return true;
    });
    if (shuffle) pool = shuffleArr([...pool]);
    let added = 0;
    for (const q of pool) {
      if (added >= count) break;
      const qm = q.marks || 0;
      if (totalMarks + qm > markTarget) continue;
      paper.push(q);
      totalMarks += qm;
      added++;
    }
  }
  return shuffle ? shuffleArr(paper) : paper;
}

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
    </svg>
    Configure topics and click <strong>Generate Paper</strong>
  </div>`;
  wrap.classList.add('empty');
  document.getElementById('export-btn').style.display = 'none';
  document.getElementById('mobile-export-btn').style.display = 'none';
  document.getElementById('paper-stats').textContent = '';
  generatedPaper = null;
}

function renderPreview(questions, config) {
  const wrap = document.getElementById('preview-wrap');
  wrap.classList.remove('empty');
  wrap.innerHTML = buildPaperHTML(questions, config).join('');
}

AAAAAABbvj4ffW83LuMAAAAldEVYdGRhdGU6Y3JlYXRlADIwMjAtMDMtMTNUMTk6MjI6NDErMDA6MDBlmhjGAAAAJXRFWHRkYXRlOm1vZGlmeQAyMDE5LTA4LTA3VDE0OjE5OjUzKzAwOjAwSDIrUAAAAE10RVh0c29mdHdhcmUASW1hZ2VNYWdpY2sgNi44LjktOSBRMTYgeDg2XzY0IDIwMTktMTEtMTIgaHR0cDovL3d3dy5pbWFnZW1hZ2ljay5vcmdkVP6gAAAAGHRFWHRUaHVtYjo6RG9jdW1lbnQ6OlBhZ2VzADGn/7svAAAAGXRFWHRUaHVtYjo6SW1hZ2U6OkhlaWdodAAyNDAwx8F5FAAAABh0RVh0VGh1bWI6OkltYWdlOjpXaWR0aAAyNDAw0oilDQAAABl0RVh0VGh1bWI6Ok1pbWV0eXBlAGltYWdlL3BuZz+yVk4AAAAXdEVYdFRodW1iOjpNVGltZQAxNTY1MTg3NTkzhy7tQwAAABJ0RVh0VGh1bWI6OlNpemUAMjMwS0JCSLpGggAAAB50RVh0VGh1bWI6OlVSSQBmaWxlOi8vb2NyLWxvZ28ucG5nbGPdJwAAAABJRU5ErkJggg=='
    ? `data:image/png;base64,${OCR_LOGO_B64}` : '';
  const logoTag = logoSrc
    ? `<img class="cover-logo" src="${logoSrc}" alt="OCR">`
    : `<div class="cover-logo" style="width:130px;height:60px;display:flex;align-items:center;justify-content:center;border:2px solid #1a3a5c;font-family:Arial Black,Arial;font-size:22pt;font-weight:900;color:#1a3a5c;letter-spacing:3px">OCR</div>`;

  // Cover
  const cover = `<div class="a4-page"><div class="page-inner">
  ${logoTag}
  <hr class="cover-line">
  <div class="cover-title">${levelStr}</div>
  <div class="cover-ref">${paperRef}</div>
  <div class="cover-practice">${viewMode === 'ms' ? 'MARK SCHEME' : 'PRACTICE PAPER'}</div>
  <div class="cover-meta-grid">
    <span class="label">Date:</span>         <span class="value">${dateStr}</span>
    <span class="label">Time Allowed:</span>  <span class="value">${timeAllowed}</span>
  </div>
  <div class="candidate-boxes">
    <div class="candidate-box"><div class="box-label">Candidate Name</div><div class="box-line"></div></div>
    <div class="candidate-box"><div class="box-label">Candidate Number</div><div class="box-line"></div></div>
  </div>
  <div class="candidate-box-3"><div class="box-label">Centre Number</div><div class="box-line"></div></div>
  <div class="instructions-box">
    <h3>Instructions</h3>
    <ul>
      <li>Answer <strong>all</strong> the questions.</li>
      <li>Use <strong>black ink</strong>.</li>
      <li>Write your answer to each question in the space provided.</li>
      <li>Additional paper may be used if required.</li>
    </ul>
    <div class="cover-total">Total marks for this paper: <strong>${totalMarks}</strong></div>
  </div>
</div></div>`;

  // Pack questions into pages
  const CONTENT_H = 990; // px, approx A4 content area at screen res
  function estH(q) {
    let h = 50 + Math.ceil((q.text||'').length / 80) * 18;
    const subs = q.sub_questions || [];
    if (!subs.length) {
      h += Math.max(2, q.marks||0) * 30;
    } else {
      for (const s of subs) {
        h += 40 + Math.ceil((s.text||'').length/80)*18;
        const ss = s.sub_questions||[];
        if (!ss.length) { h += Math.max(2, s.marks||0)*30; }
        else { for (const x of ss) { h += 35 + Math.max(2,x.marks||0)*30; } }
      }
    }
    return h;
  }

  const pages = [[]];
  const heights = [0];
  for (let i=0; i<questions.length; i++) {
    const h = estH(questions[i]);
    const li = pages.length-1;
    if (heights[li]+h > CONTENT_H && heights[li]>0) { pages.push([]); heights.push(0); }
    pages[pages.length-1].push({q:questions[i], num:i+1});
    heights[heights.length-1] += h;
  }

  function answerLines(marks, isSub) {
    const n = Math.max(isSub?2:3, marks);
    return `<div class="answer-space"><div class="answer-lines" style="height:${n*8}mm"></div></div>`;
  }
  function cleanText(s) {
    return String(s||'')
      .replace(/\(cid:\d+\)/g, '\u2022')
      .replace(/[.\u2026_]{6,}/g, '')
      .replace(/\s*Turn over\s*.*$/i, '')
      .replace(/\s*©\s*OCR\s+\d{4}.*$/i, '')
      .replace(/\s+PMT\s*$/i, '')
      .replace(/\s*\[\d+\]\s*$/, '')
      .replace(/^\s*\d+\s+(?=[A-Z(])/, '')
      .replace(/\s+/g, ' ').trim();
  }
  function buildSSub(ss, idx) {
    if (!(ss.marks > 0)) return '';
    const lbl = ['i','ii','iii','iv','v','vi','vii','viii','ix','x'][idx]||String(idx+1);
    return `<div class="subsub-block">
  <div class="sub-num-row">
    <span class="sub-label">(${lbl})</span>
    <span class="sub-text">${esc(cleanText(ss.text))}</span>
    <span class="sub-marks">[${ss.marks}]</span>
  </div>${answerLines(ss.marks,true)}</div>`;
  }
  function buildSub(sub, idx) {
    const ssubs = (sub.sub_questions||[]).map((x,i)=>buildSSub(x,i)).join('');
    // Skip 0-mark subs that have no useful sub-sub-questions
    if (!(sub.marks > 0) && !ssubs) return '';
    const lbl = String.fromCharCode(97+idx);
    const marksSpan = ssubs ? '' : `<span class="sub-marks">[${sub.marks}]</span>`;
    return `<div class="sub-block">
  <div class="sub-num-row">
    <span class="sub-label">(${lbl})</span>
    <span class="sub-text">${esc(cleanText(sub.text||''))}</span>
    ${marksSpan}
  </div>${ssubs||answerLines(sub.marks||0,true)}</div>`;
  }
  function buildQ(q, num) {
    const msIdSpan = `<span style="font-size:8px;color:#bbb;margin-left:4px;font-weight:normal">${q.id}-ms</span>`;
    const qsIdSpan = `<span style="font-size:8px;color:#bbb;margin-left:4px;font-weight:normal">${q.id}-qs</span>`;

    // ── Mark Scheme mode ──────────────────────────────────────────
    if (viewMode === 'ms') {
      if (q.ms_image) {
        return `<div class="question-block">
  <div class="question-num-row" style="margin-bottom:2mm">
    <span class="question-num">${num}</span>${msIdSpan}
  </div>
  <img src="${q.ms_image}" style="width:100%;display:block;border:none">
</div>`;
      }
      // No MS image available
      return `<div class="question-block">
  <div class="question-num-row" style="margin-bottom:2mm">
    <span class="question-num">${num}</span>${msIdSpan}
    <span style="font-size:10pt;color:#aaa;font-style:italic;margin-left:4px">Mark scheme not available</span>
  </div>
</div>`;
    }

    // ── Question Paper mode ───────────────────────────────────────
    if (q.image) {
      return `<div class="question-block">
  <div class="question-num-row" style="margin-bottom:2mm">
    <span class="question-num">${num}</span>${qsIdSpan}
  </div>
  <img src="${q.image}" style="width:100%;display:block;border:none">
</div>`;
    }
    const subs = (q.sub_questions||[]).map((s,i)=>buildSub(s,i)).join('');
    const marksSpan = subs ? '' : `<span class="question-marks">[${q.marks||0}]</span>`;
    return `<div class="question-block">
  <div class="question-num-row">
    <span class="question-num">${num}</span>${qsIdSpan}
    <span class="question-text">${esc(cleanText(q.text))}</span>
    ${marksSpan}
  </div>${subs||answerLines(q.marks||0,false)}
</div>`;
  }

  const qPages = pages.map((pageQs, pi) => {
    const isLast = pi === pages.length-1;
    return `<div class="a4-page"><div class="page-inner">
  <div class="page-header"><span>${paperRef}</span><span>${viewMode === 'ms' ? 'Mark Scheme' : 'Practice Paper'}</span></div>
  <div class="questions-area">${pageQs.map(({q,num})=>buildQ(q,num)).join('')}</div>
  <div class="page-footer">
    <span class="footer-page">${pi+2}</span>
${isLast?'':'<span class="turn-over">Turn over &#9658;</span>'}
  </div>
</div></div>`;
  });

  return [cover, ...qPages];
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// PDF EXPORT
// ═══════════════════════════════════════════════════════════════════
async function exportPDF() {
  if (!generatedPaper) return;
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.textContent = 'Exporting...';

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const render = document.getElementById('paper-render');
    render.innerHTML = buildPaperHTML(generatedPaper.questions, generatedPaper.config).join('');
    const pageDivs = render.querySelectorAll('.a4-page');

    for (let i=0; i<pageDivs.length; i++) {
      setMsg(`Rendering page ${i+1} of ${pageDivs.length}...`);
      const canvas = await html2canvas(pageDivs[i], {
        scale:2, useCORS:true, backgroundColor:'#ffffff', logging:false
      });
      if (i>0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,0,210,297);
    }

    render.innerHTML = '';
    const isAS = generatedPaper.config.level === 'aslevel';
    const dateStr = new Date().toISOString().slice(0,10);
    pdf.save(`OCR_${isAS?'H047':'H446'}_${viewMode==='ms'?'MarkScheme':'Practice'}_${dateStr}.pdf`);
    setMsg('Done.');
    setTimeout(()=>setMsg(''), 3000);
  } catch(e) {
    setMsg('Export failed: ' + e.message);
    console.error(e);
  }
  btn.disabled = false;
  btn.textContent = 'Export PDF';
}

// REPORT
// ═══════════════════════════════════════════════════════════════════
function openReport(prefillId) {
  document.getElementById('report-id').value = prefillId || '';
  document.getElementById('report-desc').value = '';
  document.getElementById('report-status').textContent = '';
  document.getElementById('report-send').disabled = false;
  document.getElementById('report-overlay').classList.add('open');
  document.getElementById('report-id').focus();
}
function closeReport() {
  document.getElementById('report-overlay').classList.remove('open');
}
async function sendReport() {
  const id   = document.getElementById('report-id').value.trim();
  const desc = document.getElementById('report-desc').value.trim();
  const status = document.getElementById('report-status');
  if (!id) { status.style.color='#c62828'; status.textContent='Question / Answer ID is required.'; return; }
  document.getElementById('report-send').disabled = true;
  status.style.color = '#555';
  status.textContent = 'Sending…';
  const body = {
    embeds: [{
      title: '🚩 Question Report',
      color: 0xc62828,
      fields: [
        { name: 'Question / Answer ID', value: id, inline: true },
        { name: 'Description', value: desc || '*(none)*', inline: false },
      ],
      timestamp: new Date().toISOString(),
    }]
  };
  try {
    const r = await fetch('https://discord.com/api/webhooks/1494650613705867385/0ubKOHM5nAuJUF_Oamn_Br7DfBYgVImCk_j6mgALFqdsvdp2kalY_2CW_GcdspTPiZ__', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (r.ok || r.status === 204) {
      status.style.color = '#2e7d32';
      status.textContent = 'Report sent — thank you!';
      setTimeout(closeReport, 1500);
    } else {
      throw new Error(`HTTP ${r.status}`);
    }
  } catch(e) {
    document.getElementById('report-send').disabled = false;
    status.style.color = '#c62828';
    status.textContent = 'Failed to send. Check your connection.';
  }
}
